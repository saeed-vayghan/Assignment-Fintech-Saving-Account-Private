<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alborz Bank Savings Architecture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --border: #e2e8f0;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --timeline-line: #cbd5e1;
            --code-bg: #f1f5f9;
            --modal-bg: rgba(255, 255, 255, 0.98);
            --scrollbar-thumb: #e2e8f0;
            /* Extra Light Gray (Slate 200) */
            --btn-gray: #64748b;
            --btn-gray-hover: #475569;
        }

        /* Dark Mode Class & Preference */
        body.dark-mode {
            --bg-primary: #020617;
            /* Deepest Navy Black */
            --bg-secondary: #0f172a;
            /* Slate 900 */
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            /* Indigo 500 */
            --accent-hover: #818cf8;
            --border: #1e293b;
            /* Slate 800 */
            --card-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
            --timeline-line: #334155;
            --code-bg: #010413;
            --modal-bg: rgba(2, 6, 23, 0.96);
            --scrollbar-thumb: #cbd5e1;
            /* Light Gray (Slate 300 in Dark) */
            --btn-gray: #475569;
            --btn-gray-hover: #334155;
        }

        @media (prefers-color-scheme: dark) {
            body:not(.light-mode) {
                --bg-primary: #020617;
                --bg-secondary: #0f172a;
                --text-primary: #f8fafc;
                --text-secondary: #94a3b8;
                --accent: #6366f1;
                --accent-hover: #818cf8;
                --border: #1e293b;
                --card-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
                --timeline-line: #334155;
                --code-bg: #010413;
                --modal-bg: rgba(2, 6, 23, 0.96);
                --scrollbar-thumb: #cbd5e1;
                /* Light Gray (Slate 300 in Dark) */
                --btn-gray: #475569;
                --btn-gray-hover: #334155;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 4rem 2rem 2rem;
            max-width: 1500px;
            margin: 0 auto;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.025em;
        }

        header p {
            font-size: 1.125rem;
            color: var(--text-secondary);
        }

        /* Timeline Containers */
        .resizable-container {
            max-width: 1500px;
            margin: 4rem auto;
            padding: 0 2rem;
            resize: horizontal;
            overflow: auto;
            border: 1px dashed transparent;
            transition: border-color 0.3s;
            min-width: 320px;
        }

        .resizable-container:hover {
            border-color: var(--border);
        }

        .timeline {
            position: relative;
            width: 100%;
            margin: 0;
        }

        .timeline::after {
            content: '';
            position: absolute;
            width: 4px;
            background-color: var(--timeline-line);
            top: 0;
            bottom: 0;
            left: 50%;
            margin-left: -2px;
            border-radius: 4px;
        }

        .timeline-item {
            padding: 10px 40px;
            position: relative;
            background-color: inherit;
            width: 50%;
        }

        .timeline-item.left {
            left: 0;
        }

        .timeline-item.right {
            left: 50%;
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            right: -10px;
            background-color: var(--bg-secondary);
            border: 4px solid var(--accent);
            top: 24px;
            border-radius: 50%;
            z-index: 1;
        }

        .timeline-item.right::after {
            left: -10px;
        }

        .card {
            padding: 24px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            position: relative;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 8px 10px -6px rgba(0, 0, 0, 0.2);
        }

        .card .category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            background-color: var(--accent-hover);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            padding: 2rem;
            overflow-y: auto;
        }

        .modal {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            margin: 2% auto;
            padding: 0;
            width: 90%;
            max-width: 1350px;
            border-radius: 16px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            scroll-behavior: smooth;
            /* Smooth scrolling */
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
            background-color: var(--modal-bg);
            backdrop-filter: blur(10px);

            /* Scrollbar Style - Standards */
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-thumb) transparent;
        }

        /* Webkit Custom Scrollbar (Premium Floating Look) */
        .modal::-webkit-scrollbar {
            width: 10px;
        }

        .modal::-webkit-scrollbar-track {
            background: transparent;
            margin: 16px 0;
            /* Prevents overlap with rounded corners! */
        }

        .modal::-webkit-scrollbar-thumb {
            background-color: var(--scrollbar-thumb);
            border-radius: 20px;
            border: 3px solid transparent;
            background-clip: content-box;
            transition: background-color 0.2s;
            opacity: 0.9;
            /* High opacity for better visibility */
        }

        .modal::-webkit-scrollbar-thumb:hover {
            opacity: 1;
            /* Pure light gray on hover */
        }

        .modal-header {
            padding: 24px 3rem;
            border-bottom: 1px solid var(--border);
            background-color: var(--modal-bg);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .modal-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .modal-title {
            font-weight: 600;
            font-size: 1.25rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 3rem;
        }

        /* Markdown Styling */
        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            margin-top: 1.5em;
            margin-bottom: 0.75em;
            font-weight: 600;
        }

        .markdown-content h1 {
            font-size: 2rem;
            margin-top: 0;
        }

        .markdown-content h2 {
            font-size: 1.5em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.3em;
        }

        .markdown-content p {
            margin-bottom: 1.25em;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 1.25em;
            padding-left: 2em;
        }

        .markdown-content li {
            margin-bottom: 0.5em;
        }

        .markdown-content code {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-primary);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.85em;
            color: var(--accent);
        }

        .markdown-content pre {
            background-color: var(--code-bg);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1.25em;
            border: 1px solid var(--border);
        }

        .markdown-content pre code {
            background-color: transparent;
            color: var(--text-primary);
            padding: 0;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5em;
        }

        .mermaid-container {
            position: relative;
            background-color: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin: 1.5rem 0;
            height: 70vh;
            /* Increased height for better vertical utilization */
            min-height: 550px;
            width: 100%;
            overflow: hidden;
            cursor: move;
        }

        .mermaid-container .zoom-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background-color: var(--accent);
            color: white;
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 10;
            pointer-events: none;
            opacity: 0.8;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4);
        }

        .fullscreen-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            z-index: 20;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .fullscreen-btn:hover {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: scale(1.05);
        }

        /* Fullscreen Overlay */
        .fullscreen-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: var(--bg-primary);
            z-index: 2000;
            padding: 0;
            /* REMOVED PADDING FOR MAX SPACE */
            flex-direction: column;
        }

        .fullscreen-overlay.active {
            display: flex;
        }

        .fullscreen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            height: 64px;
            box-sizing: border-box;
        }

        .exit-fullscreen-btn {
            background-color: #ef4444;
            /* Proactive Red for Exit */
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 99px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            transition: all 0.2s;
        }

        .exit-fullscreen-btn:hover {
            transform: scale(1.05);
            background-color: #dc2626;
        }

        .fullscreen-container {
            flex-grow: 1;
            background-color: var(--code-bg);
            position: relative;
            overflow: hidden;
            width: 100%;
            /* No border or radius to maximize space */
        }

        .mermaid-container svg {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* Ensure svg-pan-zoom controls are visible */
        #svg-pan-zoom-controls {
            fill: var(--accent);
            fill-opacity: 0.8;
            cursor: pointer;
        }

        #svg-pan-zoom-controls:hover {
            fill-opacity: 1;
        }

        .markdown-content th,
        .markdown-content td {
            padding: 12px;
            border: 1px solid var(--border);
            text-align: left;
        }

        .markdown-content th {
            background-color: var(--bg-primary);
        }

        .markdown-content blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 1rem;
            color: var(--text-secondary);
            font-style: italic;
            margin-bottom: 1.25em;
        }

        /* Mermaid Container */
        .mermaid {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .mermaid svg {
            width: 100% !important;
            height: 100% !important;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 1100;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.75rem;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background-color 0.2s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            background-color: var(--bg-primary);
        }

        .back-btn {
            background-color: var(--btn-gray);
            border: none;
            color: white;
            padding: 10px 24px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 99px;
            /* Pill shape */
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px 0 rgba(0, 0, 0, 0.2);
        }

        .back-btn:hover {
            background-color: var(--btn-gray-hover);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            stroke-width: 2;
            fill: none;
            stroke: currentColor;
        }

        .theme-toggle .sun {
            display: none;
        }

        .theme-toggle .moon {
            display: block;
        }

        body.dark-mode .theme-toggle .sun {
            display: block;
        }

        body.dark-mode .theme-toggle .moon {
            display: none;
        }

        @media screen and (max-width: 768px) {
            .timeline::after {
                left: 31px;
            }

            .timeline-item {
                width: 100%;
                padding-left: 70px;
                padding-right: 25px;
            }

            .timeline-item.right {
                left: 0;
            }

            .timeline-item.left::after,
            .timeline-item.right::after {
                left: 21px;
                right: auto;
            }

            .modal-overlay {
                padding: 1rem;
            }

            .resizable-container {
                margin: 2rem 0;
                width: 100% !important;
                resize: none;
            }
        }

        /* Card Action Bar */
        .card-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: auto;
            padding-top: 5px;
        }

        .action-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background-color: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            color: var(--accent);
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        body.dark-mode .action-icon {
            background-color: rgba(99, 102, 241, 0.2);
        }

        .action-icon:hover {
            background-color: var(--accent);
            color: white;
            transform: translateY(-2px);
        }

        .sub-item-btn {
            white-space: nowrap;
            padding: 6px 20px;
            /* More standard padding */
        }

        .phase-list .card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .phase-list .card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

        <svg class="moon" viewBox="0 0 24 24">

            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>

            <line x1="1" y1="12" x2="3" y2="12"></line>

            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
    </button>

    <header>
        <h1>Alborz Bank Architecture State Machine</h1>
        <p>A step-by-step walkthrough of the architectural specifications, system designs, and infrastructure models.
        </p>
    </header>

    <div class="resizable-container">
        <div class="timeline" id="timeline">
            <!-- Dynamic Content Loaded Here -->
        </div>
    </div>
    <!-- File Viewer Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Document Viewer</div>
                <div class="modal-actions" id="modalActions">
                    <button class="close-btn" id="closeBtn">&times;</button>
                </div>
            </div>
            <div class="modal-body">
                <div class="markdown-content" id="modalContent"></div>
            </div>

    <div class="fullscreen-overlay" id="fullscreenOverlay">
        <div class="fullscreen-header">
            <h2 id="fullscreenTitle" style="font-size: 1.25rem;">Architecture Deep Dive</h2>
            <button class="exit-fullscreen-btn" id="exitFullscreen">Exit Full Screen</button>
        </div>
        <div class="fullscreen-container" id="fullscreenContainer"></div>
    </div>

    <!-- External Dependencies -->
    <!-- Markdown Parser -->
    <!-- Scripts are now in <head> -->
    <script>
        // Robust initialization wrapper
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;
            let currentPhase = null;

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                body.classList.add('dark-mode');
            } else if (savedTheme === 'light') {
                body.classList.add('light-mode');
            }

            themeToggle.addEventListener('click', () => {
                if (body.classList.contains('dark-mode')) {
                    body.classList.remove('dark-mode');
                    body.classList.add('light-mode');
                    localStorage.setItem('theme', 'light');
                } else if (body.classList.contains('light-mode')) {
                    body.classList.remove('light-mode');
                    body.classList.add('dark-mode');
                    localStorage.setItem('theme', 'dark');
                } else {
                    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    if (isDark) {
                        body.classList.add('light-mode');
                        localStorage.setItem('theme', 'light');
                    } else {
                        body.classList.add('dark-mode');
                        localStorage.setItem('theme', 'dark');
                    }
                }
                updateMermaidTheme();
            });

            function updateMermaidTheme() {
                const isDark = body.classList.contains('dark-mode') ||
                    (!body.classList.contains('light-mode') && window.matchMedia('(prefers-color-scheme: dark)').matches);
                mermaid.initialize({
                    theme: isDark ? 'dark' : 'default',
                    themeVariables: isDark ? {
                        primaryColor: '#6366f1',
                        primaryTextColor: '#f8fafc',
                        primaryBorderColor: '#1e293b',
                        lineColor: '#6366f1',
                        secondaryColor: '#0f172a',
                        tertiaryColor: '#020617'
                    } : {},
                    securityLevel: 'loose',
                    fontFamily: 'Inter, sans-serif',
                    useMaxWidth: false, // Prevents Mermaid from forcing its own scaling
                    startOnLoad: false
                });
            }

            try {
                updateMermaidTheme();
            } catch (e) {
                console.error("Mermaid init failed:", e);
            }

            const customIntro = {
                isStatic: true,
                phase: "Introduction",
                description: "The architect's methodology and presentation guide.",
                items: [{
                    id: "state-0",
                    title: "Stage 0: Presentation Guide & Approach",
                    desc: "Start here! Rationale behind the deliverables.",
                    path: "custom",
                    content: `
# Alborz Bank Architecture & Strategy
Welcome! This presentation showcases my deep passion for **Software Architecture** and **Organization Design**. 

### 💡 Beyond Diagrams
I believe architecture is about more than boxes and arrows. It’s about creating a sustainable engineering culture:
- **People & Teams**: Organizing for maximum speed and clear ownership.
- **Communication**: Ending silos with clear, document-oriented workflows.
- **Culture**: Building a proactive environment that constantly challenges its own decisions.
- **Resources**: Strategic planning for long-term growth and stability.

### 🛠️ My Approach
1.  **Refine & Structure**: Turning vague ideas into detailed, actionable specs.
2.  **Elaborate**: Asking the right questions to find the "missing pieces."
3.  **Think Ahead**: Building a strategy that wins in the long run.
4.  **Empathy**: Thinking like an engineer (to simplify dev) and a product lead (to deliver value).
5.  **Recursive**: Constantly reviewing and challenging my own decisions.
6.  **Continuous Design**: Staying proactively as the project evolves.

Explore **Phase 1** to see the journey begin!
`
                }]
            };

            const timelineDiv = document.getElementById('timeline');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalContent = document.getElementById('modalContent');
            const modalTitle = document.getElementById('modalTitle');
            const closeBtn = document.getElementById('closeBtn');
            const modalActions = document.getElementById('modalActions'); // Added this line

            const fullscreenOverlay = document.getElementById('fullscreenOverlay');
            const fullscreenContainer = document.getElementById('fullscreenContainer');
            const exitFullscreen = document.getElementById('exitFullscreen');
            const fullscreenTitle = document.getElementById('fullscreenTitle');

            function escapeHTML(str) {
                if (!str) return "";
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function openPhase(phase) {
                currentPhase = phase;
                modalOverlay.style.display = 'block';
                document.body.style.overflow = 'hidden';
                modalTitle.innerHTML = `<span style="font-weight: 700; font-size: 1.25rem;">${escapeHTML(phase.phase)}</span>`;

                // Reset actions for Phase level (only Close button)
                modalActions.innerHTML = `
                     <button class="close-btn" id="closeBtn">&times;</button>
                 `;
                document.getElementById('closeBtn').onclick = closeModal; // Re-attach listener

                let listHtml = `<div class="phase-list" style="display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));">`;
                phase.items.forEach(item => {
                    const rightIconHtml = item.hasDiagram ? `
                        <div class="action-icon" title="Contains Architecture Diagrams">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10v6M12 4v16M2 10l10-6 10 6-10 6-10-6z"/></svg>
                        </div>
                    ` : "";

                    listHtml += `
                         <div class="card" style="display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border); box-shadow: none;">
                             <div>
                                 <h3 style="font-size: 1rem; margin-bottom: 0.5rem; color: var(--text-primary);">${escapeHTML(item.title)}</h3>
                                 <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem;">${escapeHTML(item.desc)}</p>
                             </div>
                             <div class="card-actions">
                                 <button class="btn sub-item-btn" data-id="${item.id}" style="border-radius: 4px; padding: 6px 12px; font-size: 0.8rem;">View Document</button>
                                 ${rightIconHtml}
                             </div>
                         </div>
                     `;
                });
                listHtml += `</div>`;
                modalContent.innerHTML = listHtml;

                modalContent.querySelectorAll('.sub-item-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const item = phase.items.find(i => i.id === btn.dataset.id);
                        openDocument(item);
                    });
                });
            }

            async function openDocument(item) {
                modalOverlay.style.display = 'block';
                document.body.style.overflow = 'hidden';

                modalTitle.innerHTML = `<span style="font-weight: 700; font-size: 1.25rem;">${escapeHTML(item.title)}</span>`;

                // Set actions for Document level (Back + Close)
                modalActions.innerHTML = `
                     ${currentPhase ? `<button id="backBtn" class="back-btn">&larr; Back</button>` : ""}
                     <button class="close-btn" id="closeBtn">&times;</button>
                 `;
                document.getElementById('closeBtn').onclick = closeModal; // Re-attach listener

                if (currentPhase) {
                    document.getElementById('backBtn').addEventListener('click', () => openPhase(currentPhase));
                }

                modalContent.innerHTML = '<div style="text-align:center; padding: 2rem;">⏳ Loading...</div>';

                let markdownText = "";
                if (item.path === 'custom') {
                    markdownText = item.content.trim();
                } else {
                    try {
                        const response = await fetch(item.path, { cache: 'no-store' });
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        markdownText = await response.text();
                    } catch (err) {
                        modalContent.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
                        return;
                    }
                }

                try {
                    let htmlContent = marked.parse(markdownText);
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = htmlContent;
                    const codeBlocks = tempDiv.querySelectorAll('pre code.language-mermaid');
                    codeBlocks.forEach((block, idx) => {
                        const pre = block.parentElement;
                        const content = block.textContent;
                        const container = document.createElement('div');
                        container.className = 'mermaid-container';
                        container.innerHTML = `
                              <div class="zoom-badge">Interactive Architecture</div>
                              <button class="fullscreen-btn" data-mermaid-idx="${idx}">
                                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                                  Full Screen
                              </button>
                              <div class="mermaid">${content}</div>
                          `;

                        container.querySelector('.fullscreen-btn').onclick = () => openFullscreen(content, item.title);
                        pre.replaceWith(container);
                    });

                    modalContent.innerHTML = '';
                    while (tempDiv.firstChild) {
                        modalContent.appendChild(tempDiv.firstChild);
                    }
                    if (modalContent.querySelector('.mermaid')) {
                        await mermaid.run({ querySelector: '.mermaid' });

                        // Give Mermaid a moment to stabilize the SVGs in the DOM
                        setTimeout(() => {
                            const svgs = modalContent.querySelectorAll('.mermaid svg');
                            svgs.forEach(svg => {
                                // Strip Mermaid's fixed dimensions for full-container interactivity
                                svg.removeAttribute('height');
                                svg.removeAttribute('width');
                                svg.style.height = '100%';
                                svg.style.width = '100%';
                                svg.style.maxWidth = 'none';

                                try {
                                    svgPanZoom(svg, {
                                        zoomEnabled: true,
                                        controlIconsEnabled: true,
                                        fit: true,
                                        center: true,
                                        minZoom: 0.05,
                                        maxZoom: 50
                                    });
                                } catch (e) {
                                    console.error("svgPanZoom fail:", e);
                                }
                            });
                        }, 150);
                    }
                } catch (parseErr) {
                    modalContent.innerHTML = `<p style="color:red;">Render Error</p>`;
                }
            }

            async function openFullscreen(content, title) {
                fullscreenTitle.innerText = `Full Screen: ${title || "Architecture"}`;
                fullscreenContainer.innerHTML = `<div class="mermaid" style="height:100%; width:100%;">${content}</div>`;
                fullscreenOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';

                await mermaid.run({ querySelector: '#fullscreenContainer .mermaid' });

                setTimeout(() => {
                    const svg = fullscreenContainer.querySelector('svg');
                    if (svg) {
                        svg.removeAttribute('height');
                        svg.removeAttribute('width');
                        svg.removeAttribute('max-width'); // Extra insurance
                        svg.style.height = '100%';
                        svg.style.width = '100%';
                        svg.style.maxWidth = 'none'; // Overriding Mermaid's default
                        svgPanZoom(svg, {
                            zoomEnabled: true,
                            controlIconsEnabled: true,
                            fit: true,
                            center: true
                        });
                    }
                }, 150);
            }

            function closeFullscreen() {
                fullscreenOverlay.classList.remove('active');
                fullscreenContainer.innerHTML = '';
                if (!modalOverlay.style.display || modalOverlay.style.display === 'flex') {
                    // Stay hidden
                } else {
                    document.body.style.overflow = 'auto';
                }
            }

            exitFullscreen.addEventListener('click', closeFullscreen);

            function closeModal() {
                // Clean up all pan-zoom instances if necessary (typically handled by DOM removal)
                modalOverlay.style.display = 'none';
                document.body.style.overflow = 'auto';
                modalContent.innerHTML = '';
                currentPhase = null;
            }

            closeBtn.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

            async function init() {
                try {
                    const response = await fetch('./presentation_order.json', { cache: 'no-store' });
                    if (!response.ok) throw new Error("Fetch failed");
                    const phases = await response.json();

                    const allData = [customIntro, ...phases];
                    timelineDiv.innerHTML = '';

                    allData.forEach((phase, index) => {
                        const positionClass = index % 2 === 0 ? 'left' : 'right';
                        const itemDiv = document.createElement('div');
                        itemDiv.className = `timeline-item ${positionClass}`;

                        const safeTitle = escapeHTML(phase.phase);
                        const safeDesc = escapeHTML(phase.description);
                        const itemCount = (phase.items || []).length;

                        itemDiv.innerHTML = `
                             <div class="card">
                                 <div class="category">${index === 0 ? "START HERE" : `Phase ${index} (${itemCount} Items)`}</div>
                                 <h2 style="font-size: 1.5rem;">${safeTitle}</h2>
                                 <p style="-webkit-line-clamp: 3; line-clamp: 3;">${safeDesc}</p>
                                 <button class="btn phase-btn">${index === 0 ? "Explore Intro" : "Explore Phase"}</button>
                             </div>
                         `;

                        itemDiv.querySelector('.phase-btn').addEventListener('click', () => {
                            if (index === 0) {
                                currentPhase = null;
                                openDocument(phase.items[0]);
                            } else {
                                openPhase(phase);
                            }
                        });
                        timelineDiv.appendChild(itemDiv);
                    });

                } catch (err) {
                    timelineDiv.innerHTML = `<div class="card"><h2>Error</h2><p>${err.message}</p></div>`;
                }
            }
            init();
        });
    </script>
</body>

</html>
